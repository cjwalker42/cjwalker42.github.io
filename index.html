<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Weather Buddy</title>
    <!-- <link rel="icon" type="image/x-icon" href="/images/favicon.ico"> -->
    <!-- <link rel="apple-touch-icon" href="images/apple-touch-icon-iphone60x60.png"> -->
    <!-- <link rel="apple-touch-icon" sizes="60x60" href="images/apple-touchicon-ipad-76x76.png"> -->
    <!-- <link rel="apple-touch-icon" sizes="114x114" href="images/apple-touchicon-iphone-retina-120x120.png"> -->
    <!-- <link rel="apple-touch-icon" sizes="144x144" href="images/apple-touchicon-ipad-retina-152x152.png"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.8/dist/cosmo/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
<main>
    <div class="col-12 d-flex flex-column justify-content-center min-vh-100 align-items-center">
        <div class="card col-11 col-md-7 col-lg-6 col-xl-5 col-xxl-4 my-1" id="divTop">
            <div class="card-body">
                <h2 class="text-center my-3">Weather Buddy</h2>
                <div class="d-flex flex-column mb-3">
                    <div class="d-flex">
                        <div><i class="bi bi-geo-alt text-primary fs-4 m-2"></i></div>
                        <form>
                            <select class="form-control" id="cboLoc" aria-label="Select location">
                                <option value="myLocation">My Location</option>
                            </select>
                        </form>
                    </div>
                    <div class="d-flex mt-3" id="divLoc">
                        <div><button class="btn btn-primary mx-3" id="btnAddLoc">Add location</button></div>
                    </div>
                </div>
                <h3 class="text-center" id="h3Loading"></h3>
            </div>
        </div>

        <div class="card col-11 col-md-7 col-lg-6 col-xl-5 col-xxl-4 my-1 d-none" id="divToday">
            <div class="card-body">
                <h2 class="text-center my-3">Today at a Glance</h2>
                <div class="text-center" id="divSummary">
                    <i id="iconCurConditions"></i>
                    <div class="fs-1" id="divCurTemp"></div>
                    <div id="divTempFeels"></div>
                    <div class="d-flex justify-content-around mt-2">
                        <div class="d-flex flex-column">
                            <div class="d-flex justify-content-center">
                                <i class="bi bi-thermometer-sun text-primary fs-4 me-2"></i>
                                <div id="divTempTodayHigh"></div>
                            </div>
                            <div class="d-flex justify-content-center">
                                <i class="bi bi-thermometer-snow text-primary fs-4 me-2"></i>
                                <div id="divTempTodayLow"></div>
                            </div>
                        </div>
                        <div class="d-flex flex-column">
                            <div class="d-flex justify-content-center">
                                <i class="bi bi-moisture text-primary fs-4 me-2"></i>
                                <div id="divCurHum"></div>
                            </div>
                            <div class="d-flex justify-content-center">
                                <i class="bi bi-wind text-primary fs-4 me-2"></i>
                                <div id="divCurWindSpeed"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card col-11 col-md-7 col-lg-6 col-xl-5 col-xxl-4 my-1 d-none" id="divDaily">
            <div class="card-body">
                <h2 class="text-center my-3">Daily Forecast</h2>
                <div class="d-flex overflow-x-auto" id="divFlexDailies"></div>
            </div>
        </div>

        <div class="card col-11 col-md-7 col-lg-6 col-xl-5 col-xxl-4 my-1 d-none" id="divHourly">
            <div class="card-body">
                <h2 class="text-center my-3">Hourly Forecast</h2>
                <div class="d-flex overflow-x-auto" id="divFlexHourlies"></div>
            </div>
        </div>

        <div class="card col-11 col-md-7 col-lg-6 col-xl-5 col-xxl-4 my-1 d-none" id="divSearch">
            <div class="card-body" id="divSearchAndResults">
                <h2 class="text-center my-3">Search</h2>
                <form>
                    <label class="form-label" for="txtLocName">Location Name</label>
                    <input class="form-control mb-3" id="txtLocName">
                    <button class="btn btn-primary" type="button" id="btnSearchLoc">Search</button>
                    <button class="btn btn-secondary" type="button" id="btnReturn">Return</button>
                </form>
            </div>
        </div>

        <div class="card col-11 col-md-7 col-lg-6 col-xl-5 col-xxl-4 my-1">
            <div class="card-body">
                <div class="text-center fw-bold">
                    <a href="https://open-meteo.com/">Weather data by Open-Meteo.com</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
</main>
</body>
</html>
